<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="380" viewBox="0 0 1200 380" role="img" aria-label="Hazem Elerefy — Applied AI & Data Analyst">
  <title>Hazem Elerefy — Hero Banner Light</title>
  <defs>
    <linearGradient id="bg-grad" x1="0" y1="0" x2="0.2" y2="1">
      <stop offset="0%" stop-color="#fafbff"/>
      <stop offset="50%" stop-color="#f0f2ff"/>
      <stop offset="100%" stop-color="#e8ecff"/>
    </linearGradient>
    <radialGradient id="bg-glow-c" cx="0.5" cy="0.4" r="0.5">
      <stop offset="0%" stop-color="#ddd6fe" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#fafbff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="name-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0891b2"/>
      <stop offset="35%" stop-color="#7c3aed"/>
      <stop offset="65%" stop-color="#db2777"/>
      <stop offset="100%" stop-color="#0891b2"/>
    </linearGradient>
    <linearGradient id="grid-fade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow-sm">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-md">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="380" fill="url(#bg-grad)"/>
  <rect width="1200" height="380" fill="url(#bg-glow-c)"/>

