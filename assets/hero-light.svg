  <!-- Corner brackets -->
  <g stroke="#7c3aed" stroke-width="1.5" fill="none" opacity="0.2">
    <path d="M30,30 L30,10 L50,10"/>
    <path d="M1170,30 L1170,10 L1150,10"/>
    <path d="M30,350 L30,370 L50,370"/>
    <path d="M1170,350 L1170,370 L1150,370"/>
  </g>

  <!-- Flanking accent lines -->
  <g opacity="0.2">
    <line x1="100" y1="155" x2="280" y2="155" stroke="#7c3aed" stroke-width="1"/>
    <line x1="920" y1="155" x2="1100" y2="155" stroke="#0891b2" stroke-width="1"/>
  </g>

  <!-- Decorative dots -->
  <g fill="#7c3aed" opacity="0.3">
    <circle cx="275" cy="155" r="2.5"/>
    <circle cx="925" cy="155" r="2.5"/>
  </g>

  <!-- Central glow -->
  <ellipse cx="600" cy="155" rx="350" ry="50" fill="#7c3aed" opacity="0.03" filter="url(#glow-md)"/>

  <!-- Main name -->
  <text x="600" y="168" text-anchor="middle" font-family="'JetBrains Mono','SF Mono','Fira Code','Cascadia Code',monospace" font-size="62" font-weight="800" fill="url(#name-grad)" letter-spacing="8">HAZEM ELEREFY</text>

  <!-- Role tagline -->
  <text x="600" y="210" text-anchor="middle" font-family="'JetBrains Mono','SF Mono','Fira Code',monospace" font-size="15" fill="#7c3aed" letter-spacing="3" opacity="0.75">APPLIED AI &amp; DATA ANALYST  ·  FRONTEND-DESIGN CRAFTSMAN</text>

  <!-- Tech keywords -->
  <text x="600" y="240" text-anchor="middle" font-family="'JetBrains Mono','SF Mono','Fira Code',monospace" font-size="11" fill="#64748b" letter-spacing="2" opacity="0.45">SQL  ·  PYTHON  ·  POWER BI  ·  YOLO  ·  AUTONOMOUS AGENTS  ·  REACT  ·  THREE.JS</text>

  <!-- Bottom accent -->
