<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="40" viewBox="0 0 1200 40" role="img" aria-label="Section divider">
  <title>Section Divider</title>
  <defs>
    <linearGradient id="line-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0"/>
      <stop offset="20%" stop-color="#22d3ee" stop-opacity="0.4"/>
      <stop offset="50%" stop-color="#a78bfa" stop-opacity="0.6"/>
      <stop offset="80%" stop-color="#f472b6" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#f472b6" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Main gradient line -->
  <line x1="0" y1="20" x2="1200" y2="20" stroke="url(#line-grad)" stroke-width="1"/>

  <!-- Center diamond -->
  <g transform="translate(600,20)" filter="url(#glow)">
    <polygon points="0,-5 5,0 0,5 -5,0" fill="#a78bfa" opacity="0.8">
      <animate attributeName="opacity" values="0.8;1;0.8" dur="3s" repeatCount="indefinite"/>
    </polygon>
  </g>

  <!-- Side accent dots -->
  <g fill="#22d3ee" opacity="0.3">
    <circle cx="560" cy="20" r="1.5">
      <animate attributeName="opacity" values="0.3;0.7;0.3" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="640" cy="20" r="1.5">
      <animate attributeName="opacity" values="0.3;0.7;0.3" dur="4s" repeatCount="indefinite" begin="2s"/>
    </circle>
  </g>

  <!-- Outer accent dots -->
  <g fill="#f472b6" opacity="0.2">
    <circle cx="520" cy="20" r="1"/>
    <circle cx="680" cy="20" r="1"/>
  </g>
</svg>