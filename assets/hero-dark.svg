<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="380" viewBox="0 0 1200 380" role="img" aria-label="Hazem Elerefy - Applied AI & Data Analyst">
  <title>Hazem Elerefy - Hero Banner</title>
  <defs>
    <linearGradient id="bg-grad" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#060212"/>
      <stop offset="50%" stop-color="#0b0427"/>
      <stop offset="100%" stop-color="#0a0320"/>
    </linearGradient>
    <radialGradient id="bg-glow" cx="0.5" cy="0.45" r="0.5">
      <stop offset="0%" stop-color="#1a0a4e" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#060212" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orbital-glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.08"/>
      <stop offset="70%" stop-color="#22d3ee" stop-opacity="0.02"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="name-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="30%" stop-color="#a78bfa"/>
      <stop offset="60%" stop-color="#f472b6"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="grid-fade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow-sm">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-md">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-lg">
      <feGaussianBlur stdDeviation="12" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="380" fill="url(#bg-grad)"/>
  <rect width="1200" height="380" fill="url(#bg-glow)"/>
  <rect width="1200" height="380" fill="url(#orbital-glow)" transform="translate(300,20)"/>

  <g opacity="0.6">
    <circle cx="82" cy="45" r="1.2" fill="#fff"><animate attributeName="opacity" values="0.3;1;0.3" dur="3s" repeatCount="indefinite"/></circle>
    <circle cx="215" cy="92" r="0.8" fill="#a78bfa"><animate attributeName="opacity" values="0.5;1;0.5" dur="4s" repeatCount="indefinite"/></circle>
    <circle cx="430" cy="38" r="1" fill="#22d3ee"><animate attributeName="opacity" values="0.4;1;0.4" dur="2.5s" repeatCount="indefinite"/></circle>
    <circle cx="670" cy="65" r="0.7" fill="#fff"><animate attributeName="opacity" values="0.3;0.9;0.3" dur="5s" repeatCount="indefinite"/></circle>
    <circle cx="890" cy="42" r="1.1" fill="#f472b6"><animate attributeName="opacity" values="0.5;1;0.5" dur="3.5s" repeatCount="indefinite"/></circle>
    <circle cx="1050" cy="78" r="0.9" fill="#22d3ee"><animate attributeName="opacity" values="0.4;1;0.4" dur="4.5s" repeatCount="indefinite"/></circle>
    <circle cx="145" cy="165" r="0.6" fill="#fff"><animate attributeName="opacity" values="0.2;0.8;0.2" dur="6s" repeatCount="indefinite"/></circle>
    <circle cx="370" cy="195" r="0.8" fill="#a78bfa"><animate attributeName="opacity" values="0.3;0.9;0.3" dur="3s" repeatCount="indefinite"/></circle>
    <circle cx="780" cy="155" r="1" fill="#22d3ee"><animate attributeName="opacity" values="0.4;1;0.4" dur="2s" repeatCount="indefinite"/></circle>
    <circle cx="1020" cy="185" r="0.7" fill="#fff"><animate attributeName="opacity" values="0.3;0.8;0.3" dur="4s" repeatCount="indefinite"/></circle>
    <circle cx="55" cy="310" r="0.9" fill="#f472b6"><animate attributeName="opacity" values="0.4;1;0.4" dur="3.5s" repeatCount="indefinite"/></circle>
    <circle cx="950" cy="320" r="0.6" fill="#a78bfa"><animate attributeName="opacity" values="0.3;0.9;0.3" dur="5s" repeatCount="indefinite"/></circle>
    <circle cx="1130" cy="290" r="1" fill="#22d3ee"><animate attributeName="opacity" values="0.5;1;0.5" dur="2.5s" repeatCount="indefinite"/></circle>
    <circle cx="310" cy="340" r="0.7" fill="#fff"><animate attributeName="opacity" values="0.2;0.7;0.2" dur="4.5s" repeatCount="indefinite"/></circle>
    <circle cx="690" cy="335" r="0.8" fill="#a78bfa"><animate attributeName="opacity" values="0.4;1;0.4" dur="3s" repeatCount="indefinite"/></circle>
  </g>

  <g opacity="0.12" transform="translate(0,260)">
    <line x1="0" y1="0" x2="1200" y2="0" stroke="#22d3ee" stroke-width="1"/>
    <line x1="0" y1="25" x2="1200" y2="25" stroke="#22d3ee" stroke-width="0.5"/>
    <line x1="0" y1="55" x2="1200" y2="55" stroke="#22d3ee" stroke-width="0.5"/>
    <line x1="0" y1="90" x2="1200" y2="90" stroke="#22d3ee" stroke-width="0.5"/>
    <line x1="600" y1="0" x2="600" y2="120" stroke="#22d3ee" stroke-width="0.5"/>
    <line x1="600" y1="0" x2="0" y2="120" stroke="#22d3ee" stroke-width="0.3"/>
    <line x1="600" y1="0" x2="200" y2="120" stroke="#22d3ee" stroke-width="0.3"/>
    <line x1="600" y1="0" x2="400" y2="120" stroke="#22d3ee" stroke-width="0.3"/>
    <line x1="600" y1="0" x2="800" y2="120" stroke="#22d3ee" stroke-width="0.3"/>
    <line x1="600" y1="0" x2="1000" y2="120" stroke="#22d3ee" stroke-width="0.3"/>
    <line x1="600" y1="0" x2="1200" y2="120" stroke="#22d3ee" stroke-width="0.3"/>
  </g>

  <g opacity="0.08">
    <line x1="0" y1="120" x2="1200" y2="120" stroke="#a78bfa" stroke-width="0.5"/>
    <line x1="0" y1="260" x2="1200" y2="260" stroke="#22d3ee" stroke-width="0.5"/>
  </g>

  <g stroke="#22d3ee" stroke-width="1.5" fill="none" opacity="0.4">
    <path d="M30,30 L30,10 L50,10"><animate attributeName="opacity" values="0.4;0.8;0.4" dur="4s" repeatCount="indefinite"/></path>
    <path d="M1170,30 L1170,10 L1150,10"><animate attributeName="opacity" values="0.4;0.8;0.4" dur="4s" repeatCount="indefinite" begin="1s"/></path>
    <path d="M30,350 L30,370 L50,370"><animate attributeName="opacity" values="0.4;0.8;0.4" dur="4s" repeatCount="indefinite" begin="2s"/></path>
    <path d="M1170,350 L1170,370 L1150,370"><animate attributeName="opacity" values="0.4;0.8;0.4" dur="4s" repeatCount="indefinite" begin="3s"/></path>
  </g>

  <g fill="#22d3ee" opacity="0.5">
    <circle cx="30" cy="30" r="2"><animate attributeName="opacity" values="0.5;1;0.5" dur="3s" repeatCount="indefinite"/></circle>
    <circle cx="1170" cy="30" r="2"><animate attributeName="opacity" values="0.5;1;0.5" dur="3s" repeatCount="indefinite" begin="1s"/></circle>
    <circle cx="30" cy="350" r="2"><animate attributeName="opacity" values="0.5;1;0.5" dur="3s" repeatCount="indefinite" begin="2s"/></circle>
    <circle cx="1170" cy="350" r="2"><animate attributeName="opacity" values="0.5;1;0.5" dur="3s" repeatCount="indefinite" begin="3s"/></circle>
  </g>

  <g opacity="0.15">
    <rect x="90" y="70" width="40" height="40" rx="2" fill="none" stroke="#a78bfa" stroke-width="0.8" transform="rotate(45,110,90)">
      <animateTransform attributeName="transform" type="rotate" from="45 110 90" to="405 110 90" dur="20s" repeatCount="indefinite"/>
    </rect>
    <rect x="1060" y="90" width="30" height="30" rx="2" fill="none" stroke="#f472b6" stroke-width="0.8" transform="rotate(45,1075,105)">
      <animateTransform attributeName="transform" type="rotate" from="45 1075 105" to="-315 1075 105" dur="25s" repeatCount="indefinite"/>
    </rect>
  </g>

  <ellipse cx="600" cy="155" rx="400" ry="60" fill="#a78bfa" opacity="0.04" filter="url(#glow-lg)"/>

  <g opacity="0.3">
    <line x1="100" y1="155" x2="280" y2="155" stroke="url(#grid-fade)" stroke-width="1"/>
    <line x1="920" y1="155" x2="1100" y2="155" stroke="#22d3ee" stroke-width="1" opacity="0.15"/>
  </g>

  <g fill="#22d3ee" opacity="0.4">
    <circle cx="275" cy="155" r="2.5"/>
    <circle cx="925" cy="155" r="2.5"/>
  </g>

  <text x="600" y="168" text-anchor="middle" font-family="JetBrains Mono,monospace" font-size="62" font-weight="800" fill="url(#name-grad)" filter="url(#glow-md)" letter-spacing="8">HAZEM ELEREFY</text>

  <text x="600" y="210" text-anchor="middle" font-family="JetBrains Mono,monospace" font-size="15" fill="#22d3ee" letter-spacing="3" opacity="0.85">APPLIED AI &amp; DATA ANALYST  ·  FRONTEND-DESIGN CRAFTSMAN</text>

  <text x="600" y="240" text-anchor="middle" font-family="JetBrains Mono,monospace" font-size="11" fill="#94a3b8" letter-spacing="2" opacity="0.5">SQL  ·  PYTHON  ·  POWER BI  ·  YOLO  ·  AUTONOMOUS AGENTS  ·  REACT  ·  THREE.JS</text>

  <rect x="0" y="370" width="1200" height="10" fill="url(#name-grad)" opacity="0.08"/>
  <line x1="0" y1="370" x2="1200" y2="370" stroke="#22d3ee" stroke-width="0.5" opacity="0.2"/>
</svg>