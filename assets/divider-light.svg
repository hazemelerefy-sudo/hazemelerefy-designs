<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="40" viewBox="0 0 1200 40" role="img" aria-label="Section divider">
  <title>Section Divider Light</title>
  <defs>
    <linearGradient id="line-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0891b2" stop-opacity="0"/>
      <stop offset="20%" stop-color="#0891b2" stop-opacity="0.3"/>
      <stop offset="50%" stop-color="#7c3aed" stop-opacity="0.5"/>
      <stop offset="80%" stop-color="#db2777" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#db2777" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <line x1="0" y1="20" x2="1200" y2="20" stroke="url(#line-grad)" stroke-width="1"/>

  <g transform="translate(600,20)">
    <polygon points="0,-5 5,0 0,5 -5,0" fill="#7c3aed" opacity="0.7"/>
  </g>

  <g fill="#0891b2" opacity="0.25">
    <circle cx="560" cy="20" r="1.5"/>
    <circle cx="640" cy="20" r="1.5"/>
  </g>

  <g fill="#db2777" opacity="0.15">
    <circle cx="520" cy="20" r="1"/>
    <circle cx="680" cy="20" r="1"/>
  </g>
</svg>